<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
  <script>
  document.addEventListener("DOMContentLoaded", function () {
    const el = document.getElementById("email");
    if (el) {
      const user = "dutta.manish";
      const domain = "icloud.com";
      const email = user + "@" + domain;

      el.innerHTML = '<a href="mailto:' + email + '">' + email + '</a>';
    }
  });
</script>
<body>
  <div class="site-container">
    <header class="site-header">
      <div class="site-title">
        <a href="{{ '/' | relative_url }}">Manish Dutta</a>
      </div>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/about.html' | relative_url }}">About</a>
        <a href="{{ '/research.html' | relative_url }}">Research</a>
        <a href="{{ '/publications.html' | relative_url }}">Publications</a>
        <a href="{{ '/contact.html' | relative_url }}">Contact</a>
      </nav>
    </header>

    <main class="content">
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>© Manish Dutta 2026</p>
    </footer>
  </div>
</body>
</html>
